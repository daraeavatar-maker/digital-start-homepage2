<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Defensively make window.fetch writable to avoid "Cannot set property fetch of #<Window> which has only a getter"
      // errors when polyfills or sandbox frameworks try to patch or modify fetch.
      try {
        const originalFetch = window.fetch;
        if (originalFetch) {
          Object.defineProperty(window, 'fetch', {
            value: originalFetch,
            writable: true,
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn("Unable to patch window.fetch setter:", e);
      }
    </script>
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
